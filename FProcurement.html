/* PDFs that share a lot number make up one CoA → one sample. Match on the
   parsed lot # (case-insensitive) and fold the extra PDFs plus any analytes
   they carry into the first card instead of spawning a duplicate sample. */
function intakeKeyId(v){ return v==null?'':String(v).trim().toLowerCase(); }
function mergeIntake(target,src){
  const names=new Set((target.coaFiles||[]).map(f=>f.name));
  (src.coaFiles||[]).forEach(f=>{ if(!names.has(f.name)){ target.coaFiles.push(f); names.add(f.name); } });
  ['id','strain','lab','received','supplier','thc','cbd','moisture','terps'].forEach(k=>{
    const sv=src[k]; if(sv==null||sv==='')return;
    if(target[k]==null||target[k]===''||(k==='strain'&&target[k]==='(unnamed)'))target[k]=sv;
  });
  ['micro','pest'].forEach(k=>{ const sv=src[k]; if(sv==null)return; if(target[k]==null||sv==='fail')target[k]=sv; });
  /* union the per-organism panel so a split CoA (aerobic+yeast on one part,
     salmonella+E.coli on another) keeps every organism; a fail anywhere wins */
  if(src.micros&&src.micros.length){
    const by={}; (target.micros||[]).forEach(o=>{by[o.n]=o;});
    src.micros.forEach(o=>{ const e=by[o.n]; if(!e)by[o.n]=o; else if(o.s==='fail'&&e.s!=='fail')by[o.n]=o; });
    target.micros=Object.values(by);
  }
  return target;
}
async function addCoaFiles(fileList){
  const all=[...fileList].filter(Boolean);
  const files=all.filter(f=>/\.pdf$/i.test(f.name||'')||f.type==='application/pdf');
  if(!files.length){ if(all.length)toast('Only PDF certificates can be parsed'); return; }
  for(const file of files){
    const it={key:'i'+(++intakeSeq),name:file.name,status:'reading',msg:'Reading…',coaFiles:[]};
    intakeItems.push(it); patchCard(it);
    try{
      const dataUrl=await fileToDataUrl(file);
      it.coaFiles=[{name:file.name,data:dataUrl}];
      let text=''; try{ text=await extractPdfText(file); }catch(_){}
      if(text.replace(/\s+/g,'').length<40){
        it.msg='Scanned PDF — running OCR…'; patchCard(it);
        try{ text=await ocrPdf(file,msg=>{it.msg=msg;patchCard(it);}); }catch(_){}
      }
      let parsed={}; try{ parsed=parseCoa(text); }catch(_){}
      Object.assign(it,parsed);
      it.status='ok';
    }catch(err){ it.status='err'; it.msg=(err&&err.message)||'Could not read file'; patchCard(it); updateLotCount(); continue; }
    const kid=intakeKeyId(it.id);
    const tgt=kid?intakeItems.find(x=>x!==it&&x.status==='ok'&&intakeKeyId(x.id)===kid):null;
    if(tgt){
      mergeIntake(tgt,it);
      intakeItems=intakeItems.filter(x=>x!==it);
      const wrap=$('#coaItems'), card=wrap&&wrap.querySelector(`[data-item="${it.key}"]`); if(card)card.remove();
      patchCard(tgt);
      const sf=$('#supField'); if(sf&&!sf.value.trim()&&tgt.supplier)sf.value=tgt.supplier;
    } else {
      patchCard(it);
      const sf=$('#supField'); if(sf&&!sf.value.trim()&&it.supplier)sf.value=it.supplier;
    }
    updateLotCount();
  }
}
/* Attach one or more extra CoA PDFs to a lot that's already in the library.
   Parses each PDF and folds any newly-found analytes into the lot (same
   fill-don't-overwrite rules as intake), then re-renders the sample page. */
async function addPdfsToLot(id,fileList){
  const l=LOTS.find(x=>x.id===id); if(!l)return;
  const all=[...fileList].filter(Boolean);
  const files=all.filter(f=>/\.pdf$/i.test(f.name||'')||f.type==='application/pdf');
  if(!files.length){ if(all.length)toast('Only PDF certificates can be parsed'); return; }
  const btn=$('#main').querySelector('[data-coa-add]'); if(btn){btn.classList.add('busy');btn.textContent='Reading…';}
  if(!l.coaFiles||!l.coaFiles.length)l.coaFiles=l.coaData?[{name:l.coaName||'coa.pdf',data:l.coaData}]:[];
  let added=0;
  for(const file of files){
    try{
      const dataUrl=await fileToDataUrl(file);
      let text=''; try{ text=await extractPdfText(file); }catch(_){}
      if(text.replace(/\s+/g,'').length<40){ try{ text=await ocrPdf(file); }catch(_){} }
      let parsed={}; try{ parsed=parseCoa(text); }catch(_){}
      parsed.coaFiles=[{name:file.name,data:dataUrl}];
      mergeIntake(l,parsed);   // folds the new PDF + any fresh analytes into the lot
      added++;
    }catch(_){}
  }
  l.coaName=l.coaName||(l.coaFiles[0]&&l.coaFiles[0].name)||null;
  l.coaData=l.coaData||(l.coaFiles[0]&&l.coaFiles[0].data)||null;
  await savePdfBytes(id,l.coaFiles);   // keep the bytes in IndexedDB; localStorage strips them
  if(l.status==='awaiting'&&(l.coaData||l.thc!=null||l.micro))l.status='received';
  if(l.status==='received'){
    if(!l.cann||!l.cann.length)l.cann=cann(l.thc||0,l.cbd||0,ACTIVATED(l.ptype));
    if(!l.terp||!l.terp.length)l.terp=terp(l.terps||0);
  }
  const ok=saveLots();
  toast(ok?`${added} PDF${added===1?'':'s'} added to this sample`:'Browser storage is full — remove old samples and try again.');
  showPage('lot:'+id);
}
function updateLotCount(){
  const n=intakeItems.filter(it=>it.id&&String(it.id).trim()!=='').length;
  const m=$('#lotCountMeta'); if(m)m.textContent=n+' ready';
  const b=$('#saveLots'); if(b)b.textContent=n>0?`Add ${n} sample${n===1?'':'s'} to library`:'Add samples to library';
}
function commitLots(){
  syncEdits();
  const tf=$('#typeField'); const ptype=(tf&&PTYPES.indexOf(tf.value)>=0)?tf.value:intakeType;
  const sup=(($('#supField')&&$('#supField').value)||'').trim();
  const ready=intakeItems.filter(it=>it.status!=='reading'&&it.id&&String(it.id).trim()!=='');
  if(!ready.length){toast('Add a CoA PDF (or type a Lot #) first');return;}
  /* one sample per lot # — fold any same-lot cards together before writing */
  const groups=[], byId={};
  ready.forEach(it=>{ const kid=intakeKeyId(it.id); if(byId[kid])mergeIntake(byId[kid],it); else{byId[kid]=it;groups.push(it);} });
  let added=0,updated=0;
  groups.forEach(it=>{
    const files=it.coaFiles||[];
    const o={
      id:String(it.id).trim(),
      strain:it.strain||'(unnamed)',
      thc:it.thc!=null?+it.thc:null, cbd:it.cbd!=null?+it.cbd:null,
      moisture:it.moisture!=null?+it.moisture:null, terps:it.terps!=null?+it.terps:null,
      micro:it.micro||null, pest:it.pest||null, micros:(it.micros&&it.micros.length)?it.micros:null,
      lab:it.lab||'—',
      received:it.received||new Date().toISOString().slice(0,10),
      coaFiles:files, coaName:(files[0]&&files[0].name)||null, coaData:(files[0]&&files[0].data)||null,
      ptype:ptype, supplier:sup||it.supplier||'(unknown supplier)',
    };
    o.status=(o.coaData||o.thc!=null||o.micro)?'received':'awaiting';
    if(o.status==='received'){o.cann=cann(o.thc||0,o.cbd||0,ACTIVATED(o.ptype));o.terp=terp(o.terps||0);}
    const ix=LOTS.findIndex(l=>l.id===o.id);
    if(ix>=0){LOTS[ix]=o;updated++;} else {LOTS.unshift(o);added++;}
    savePdfBytes(o.id,o.coaFiles);   // durably store the bytes; coa.lots keeps only metadata
  });
  const ok=saveLots();
  const parts=[]; if(added)parts.push(added+' added'); if(updated)parts.push(updated+' updated');
  toast(ok?`${PSHORT[ptype]||ptype} · ${parts.join(' · ')}`:'Browser storage is full — CoA PDFs are too large to save. Remove old samples and try again.');
  showPage('library');
}

/* ============================ PDF parse ============================ */
async function extractPdfText(file){
  if(typeof pdfjsLib==='undefined')throw new Error('pdf.js not loaded');
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let text='';
  for(let p=1;p<=pdf.numPages;p++){const pg=await pdf.getPage(p);const c=await pg.getTextContent();text+=c.items.map(i=>i.str).join(' ')+'\n';}
  return text.trim();
}
function fileToDataUrl(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(new Error('Could not read file'));r.readAsDataURL(file);});}
/* ---- durable PDF byte store (IndexedDB) ----
   localStorage can't hold the base64 certificate bytes (1–2 MB each blows the
   ~5 MB quota), so they're stripped from coa.lots before every save. We keep the
   bytes in IndexedDB instead — keyed by lotId|filename — and rehydrate them on
   demand so the View/Download links keep working after a reload. */
const PDF_DB='coaPdfs', PDF_STORE='pdfs'; let _pdfDBP=null;
function pdfDB(){
  if(_pdfDBP)return _pdfDBP;
  _pdfDBP=new Promise((res,rej)=>{
    let rq; try{ rq=indexedDB.open(PDF_DB,1); }catch(e){ return rej(e); }
    rq.onupgradeneeded=()=>{ const db=rq.result; if(!db.objectStoreNames.contains(PDF_STORE))db.createObjectStore(PDF_STORE); };
    rq.onsuccess=()=>res(rq.result);
    rq.onerror=()=>rej(rq.error);
  });
  _pdfDBP.catch(()=>{});
  return _pdfDBP;
}
function pdfKey(id,name){ return String(id)+'|'+String(name||''); }
async function pdfPut(id,name,data){
  if(!data)return;
  try{ const db=await pdfDB(); await new Promise((res,rej)=>{ const tx=db.transaction(PDF_STORE,'readwrite'); tx.objectStore(PDF_STORE).put(data,pdfKey(id,name)); tx.oncomplete=res; tx.onerror=()=>rej(tx.error); }); }catch(_){}
}
async function pdfGet(id,name){
  try{ const db=await pdfDB(); return await new Promise((res,rej)=>{ const tx=db.transaction(PDF_STORE,'readonly'); const rq=tx.objectStore(PDF_STORE).get(pdfKey(id,name)); rq.onsuccess=()=>res(rq.result||null); rq.onerror=()=>rej(rq.error); }); }catch(_){ return null; }
}
async function savePdfBytes(id,files){ for(const f of (files||[])) if(f&&f.data) await pdfPut(id,f.name,f.data); }
/* refill any coaFiles[].data that was stripped on save, pulling the bytes back
   from IndexedDB. returns true if at least one file got its bytes restored. */
async function hydrateLotPdfs(l){
  if(!l||!l.coaFiles||!l.coaFiles.length)return false;
  let changed=false;
  for(const f of l.coaFiles){
    if(f.data||!f.name)continue;
    const d=await pdfGet(l.id,f.name);
    if(d){ f.data=d; changed=true; }
  }
  if(changed&&!l.coaData&&l.coaFiles[0])l.coaData=l.coaFiles[0].data||l.coaData;
  return changed;
}
function coaFilesOf(l){
  return (l.coaFiles&&l.coaFiles.length)?l.coaFiles:(l.coaData?[{name:l.coaName||'coa.pdf',data:l.coaData}]:[]);
}
function coaLinksHtml(l){
  const files=coaFilesOf(l);
  const dl=files.filter(f=>f.data);
  // two or more certificates collapse into one button that opens the chooser window
  if(files.length>=2)
    return `<button type="button" class="coa-docs-btn" data-coa-docs="${esc(l.id)}" title="View the ${files.length} certificates on this sample">${I.doc}${files.length} documents</button>`;
  // a single certificate stays a direct download pill
  if(dl.length===1)
    return `<a class="coa-link" href="${dl[0].data}" download="${esc(dl[0].name||'coa.pdf')}">${I.doc}<span class="coa-name">${esc(dl[0].name||'Download')}</span></a>`;
  if(l.coaUrl)
    return `<a class="coa-link" href="${esc(l.coaUrl)}" target="_blank" rel="noopener">${I.doc}<span class="coa-name">${esc(l.coaName||'View CoA in SharePoint')}</span></a>`;
  if(files.length===1)
    return `<span class="coa-link" style="opacity:.55;cursor:default">${I.doc}<span class="coa-name">${esc(files[0].name||'CoA')}</span></span>`;
  return '';
}
function coaRowHtml(l){
  return `${coaLinksHtml(l)||`<span class="lot-tag coa-none-tag"><i>CoA</i>No PDF</span>`}<button type="button" class="coa-add" data-coa-add="${esc(l.id)}" title="Attach more CoA PDFs to this sample">${I.add}Add PDF</button>`;
}
let _coaModalKey=null;
function closeCoaModal(){ const m=$('#coaModal'); if(m)m.remove(); if(_coaModalKey){document.removeEventListener('keydown',_coaModalKey);_coaModalKey=null;} }
/* Chooser window for a sample's certificates: one row per attached PDF, each a
   direct download (dim if the file has no stored data). Opened from the collapsed
   "N documents" button so multiple CoAs don't crowd the sample page. */
async function openCoaDocs(id){
  const l=LOTS.find(x=>x.id===id); if(!l)return;
  await hydrateLotPdfs(l);   // pull any stripped bytes back from IndexedDB so each row downloads
  const files=coaFilesOf(l);
  const rows=files.map(f=>f.data
    ?`<a class="coa-doc-row" href="${f.data}" download="${esc(f.name||'coa.pdf')}">${I.doc}<span class="cdr-name">${esc(f.name||'Download')}</span><span class="cdr-dl">Download</span></a>`
    :`<span class="coa-doc-row is-empty">${I.doc}<span class="cdr-name">${esc(f.name||'CoA')}</span><span class="cdr-dl">No file</span></span>`
  ).join('');
  const urlRow=(l.coaUrl&&!files.some(f=>f.data))?`<a class="coa-doc-row" href="${esc(l.coaUrl)}" target="_blank" rel="noopener">${I.doc}<span class="cdr-name">${esc(l.coaName||'View CoA in SharePoint')}</span><span class="cdr-dl">Open</span></a>`:'';
  closeCoaModal();
  const wrap=document.createElement('div');
  wrap.className='coa-modal'; wrap.id='coaModal';
  wrap.innerHTML=`<div class="coa-modal-card" role="dialog" aria-modal="true" aria-label="Certificates for ${esc(l.strain)}">
    <div class="coa-modal-head"><div><div class="cm-t">Certificates</div><div class="cm-s">${esc(l.strain)} · ${esc(l.id)} · ${files.length} document${files.length===1?'':'s'}</div></div>
      <button type="button" class="coa-modal-x" data-coa-close aria-label="Close">✕</button></div>
    <div class="coa-modal-list">${rows}${urlRow}</div>
  </div>`;
  wrap.addEventListener('click',e=>{ if(e.target===wrap||e.target.closest('[data-coa-close]'))closeCoaModal(); });
  document.body.appendChild(wrap);
  _coaModalKey=e=>{ if(e.key==='Escape')closeCoaModal(); };
  document.addEventListener('keydown',_coaModalKey);
}
/* ---- lab-aware CoA parser (validated against Vivariant / A&L / Eurofins / Pathogenia / High North) ---- */
function detectLab(T){
  if(/vivariant/i.test(T))return 'Vivariant';
  if(/pathogenia/i.test(T))return 'Pathogenia';
  if(/A\s*&\s*L\s*Canada|A&L\s*Canada/i.test(T))return 'A&L Canada';
  if(/eurofins/i.test(T))return 'Eurofins';
  if(/high\s*north/i.test(T))return 'High North';
  return null;
}
function toNum(s){ if(s==null)return null; const v=parseFloat(String(s).replace(/,/g,'')); return isNaN(v)?null:v; }
function fnum(T,re){ const m=T.match(re); return m?toNum(m[1]):null; }
function fstr(T,re){ const m=T.match(re); return m?m[1].trim().replace(/\s{2,}/g,' '):null; }
const MON={jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'};
function normDate(s){
  if(!s)return null; s=s.trim(); let m;
  if(m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/))return s;
  if(m=s.match(/^(\d{1,2})-([A-Za-z]{3})-(\d{4})$/)){const mo=MON[m[2].toLowerCase()];if(mo)return `${m[3]}-${mo}-${m[1].padStart(2,'0')}`;}
  if(m=s.match(/^(\d{1,2})([A-Za-z]{3})(\d{4})$/)){const mo=MON[m[2].toLowerCase()];if(mo)return `${m[3]}-${mo}-${m[1].padStart(2,'0')}`;}
  return null;
}
function coaAgeMonths(l){
  if(!l||l.status==='awaiting')return null;
  const d=normDate(l.received); if(!d)return null;
  const then=new Date(d+'T00:00:00'); if(isNaN(then))return null;
  const now=new Date(); now.setHours(0,0,0,0);
  let m=(now.getFullYear()-then.getFullYear())*12+(now.getMonth()-then.getMonth());
  if(now.getDate()<then.getDate())m--; // not a full month elapsed yet
  return Math.max(0,m);
}
// CoA freshness tiers: <3mo green, 3–6mo yellow, >6mo red.
function coaAgeTier(months){return months<3?'fresh':months<=6?'mid':'old';}
const AGE_VAR={fresh:'var(--teal-bright)',mid:'var(--amber)',old:'var(--coral)'};
function ageMonthsShort(m){return m===0?'<1 mo':`${m} mo`;}
function ageMonthsAgo(m){return m===0?'less than a month ago':`${m} month${m===1?'':'s'} ago`;}
function ageBadge(l){
  const m=coaAgeMonths(l); if(m==null)return '';
  return `<span class="age-flag age-${coaAgeTier(m)}" title="CoA received ${esc(l.received)} — ${ageMonthsAgo(m)}">${ageMonthsShort(m)} old</span>`;
}
function microStatus(T){
  const orgs=[/salmonella.{0,30}/i,/(?:escherichia coli|e\.?\s*coli).{0,30}/i,/(?:total aerobic|aerobic (?:microbial|plate)).{0,30}/i,/(?:yeast|mould|mold).{0,40}/i,/bile[\- ]?tolerant.{0,30}/i,/staphylococcus.{0,30}/i,/pseudomonas.{0,30}/i];
  let found=0,fail=0;
  for(const re of orgs){
    const m=T.match(re); if(!m)continue; found++;
    const w=m[0].toLowerCase();
    const bad=/\bpresent\b|positive|\bdetected\b|exceed|\bfail/.test(w);
    const ok=/absent|negative|not detected|none detected|<\s*\d|\bnd\b/.test(w);
    if(bad&&!ok)fail++;
  }
  if(found>=2)return fail>0?'fail':'pass';
  if(/microbial[\s\S]{0,500}?met specification/i.test(T))return 'pass';
  return null;
}
/* Parse the text just after an organism name into {v:displayValue,s:pass|fail}.
   Handles qualitative results (Absent/Negative/Not detected vs Present/Positive/
   Detected) and quantitative counts (<10 CFU/g, 5,400 CFU/g, <10 MPN/g). The
   "(Absent/Present)" legend that some labs print after the method is stripped so
   it is not mistaken for the result, and limit columns prefixed with ≤ are
   skipped so the actual measured count is reported, not the spec ceiling. */
function microCell(win){
  let w=String(win||'').replace(/\s+/g,' ').replace(/\(?\s*(?:absent\s*\/\s*present|present\s*\/\s*absent)\s*\)?/ig,' ');
  /* "gram negative" is part of an organism NAME, not a result — neutralise it so
     a window that spills into the next row's name never reads as Negative. */
  w=w.replace(/gram[\-\s]?negative/ig,'gram-neg');
  const cands=[]; let m;
  /* counts: skip the ≤-prefixed limit column, take the measured value */
  const cre=/(≤\s*)?(<?\s*[\d,]+(?:\.\d+)?)\s*(CFU|MPN)\s*\/\s*g/ig;
  while((m=cre.exec(w))){ if(m[1])continue; cands.push({i:m.index,v:m[2].replace(/\s+/g,'')+' '+m[3].toUpperCase()+'/g',s:'pass'}); break; }
  /* detected / present / positive => fail (but not "not detected") */
  const dre=/\b(?:present|positive|detected)\b/ig;
  while((m=dre.exec(w))){ if(/\b(?:not|none)\s+$/i.test(w.slice(0,m.index))){continue;} cands.push({i:m.index,v:'Detected',s:'fail'}); break; }
  /* absent / negative / not detected => pass */
  const qre=/\b(absent(?:\s+(?:in|per)\s+[\d.]*\s*\w+)?|negative(?:\s+[\w\-\/]+)?|not\s+detected|none\s+detected)\b/ig;
  while((m=qre.exec(w))){ let v=m[1].replace(/\s+/g,' ').trim(); cands.push({i:m.index,v:v.charAt(0).toUpperCase()+v.slice(1),s:'pass'}); break; }
  if(!cands.length)return null;
  cands.sort((a,b)=>a.i-b.i);
  return {v:cands[0].v,s:cands[0].s};
}
/* Build the full per-organism microbial panel across all lab layouts. Each
   organism is matched by its many spellings; the first occurrence that yields a
   parseable result wins (earlier mentions are method/header rows with no value). */
function microPanel(T){
  const defs=[
    ['Total aerobic count',/(?:total\s+)?aerobic\s+(?:microbial|plate)\s+count/ig],
    ['Yeast & mould',/(?:total\s+)?(?:combined\s+)?yeasts?\s*(?:and|&|\/)\s*(?:mould|mold)s?(?:\s+count)?/ig],
    ['Bile-tolerant Gram-neg',/bile[\-\s]?tolerant,?\s+gram[\-\s]?negative\s+bacteria/ig],
    ['E. coli',/escherichia\s+coli|\be\.?\s*coli\b/ig],
    ['Salmonella',/salmonella(?:\s+spp\.?)?/ig],
    ['S. aureus',/staphylococcus\s+aureus/ig],
    ['P. aeruginosa',/pseudomonas\s+aeruginosa/ig],
  ];
  const out=[];
  for(const [n,re] of defs){
    re.lastIndex=0; let m,cell=null;
    while((m=re.exec(T))){
      const start=m.index+m[0].length;
      const c=microCell(T.slice(start,start+70));
      if(c){cell=c;break;}
    }
    if(cell)out.push({n,v:cell.v,s:cell.s});
  }
  return out;
}
function pestStatus(T){
  if(/no compounds detected/i.test(T))return 'pass';
  if(/pesticide[\s\S]{0,400}?met specification/i.test(T))return 'pass';
  return null;
}
/* Eurofins layouts vary: some carry the cultivar in "Sample Description"
   (Experchem), others in "Eurofins Sample Code" (the original template), where
   "Sample Description" is just a generic matrix like "Dried Flower". Take the
   first candidate that looks like a real cultivar, not a matrix or lot code. */
function euStrain(T){
  const cands=[fstr(T,/Sample Description:\s*([A-Za-z][A-Za-z0-9 '\-]{1,38}?)\s+(?:Sample Reference|Net Weight|Net\b|Lot Number|Condition|Sample Registration|TRG\d)/i),
               fstr(T,/Eurofins Sample Code:\s+(.+?)\s+[\dA-Z]{2,}-\d{3,}/i)];
  const generic=/^(dried\s+\w+|bulk\b.*|cannabis|flower|sample|n\/?a)$/i;
  for(const c of cands){ const v=c&&c.trim(); if(v&&!generic.test(v)&&!/^\d|\d{3,}|FCB|LAB\d/i.test(v))return v; }
  return (cands[0]||cands[1]||null);
}
/* The lot is the same physical batch across the report's split PDFs, so it must
   normalize identically regardless of two-column text-extraction order. The
   "Eurofins Sample Code" label sits flush against its value (order-independent),
   carrying the lot plus a per-document replicate suffix (-LAB1/-LAB2) that we
   strip. The "Sample Reference" field is unreliable (reads "Net Weight…"), so it
   is only trusted as a letter-led code (e.g. S60251426) on the older template. */
function euLot(T){
  let m=T.match(/Lot Number\b[:\s]*([0-9][A-Za-z0-9\-]{3,})/i);
  if(m)return m[1].replace(/-(?:LAB|R|REP)\d*$/i,'');
  m=T.match(/Eurofins Sample Code:\s*([0-9][A-Za-z0-9\-]{3,})/i);
  if(m)return m[1].replace(/-(?:LAB|R|REP)\d*$/i,'');
  m=T.match(/Sample Reference\s*:?\s*([A-Za-z][A-Za-z0-9]{4,})/i);
  if(m)return m[1];
  m=T.match(/Client Sample Code:\s*([0-9][A-Za-z0-9\-]{3,})/i);
  if(m)return m[1].replace(/-(?:LAB|R|REP)\d*$/i,'');
  return null;
}
const PARSERS={
  'Vivariant':T=>({
    strain:fstr(T,/Strain Name\s+(.+?)\s+Date Sample/i),
    id:fstr(T,/Client Lot Number\s+([A-Za-z0-9\-\/]+)/i)||fstr(T,/Client Sample ID\s+([A-Za-z0-9\-\/]+)/i),
    thc:fnum(T,/Total THC\s+Report\s+\S+\s+([\d.]+)/i),
    cbd:fnum(T,/Total CBD\s+Report\s+\S+\s+([\d.]+)/i),
    moisture:fnum(T,/Loss on Drying\s+<?\s*[\d.]+\s+([\d.]+)/i),
    terps:fnum(T,/Total Terpenes\s+Report\s+\S+\s+([\d.]+)/i),
    received:normDate(fstr(T,/Date Sample Received\s+([\d\-]{8,10})/i)),
    micros:microPanel(T),micro:microStatus(T),pest:pestStatus(T),supplier:null,
  }),
  'A&L Canada':T=>({
    strain:fstr(T,/STRAIN:\s*(.+?)\s+DATE/i),
    id:fstr(T,/SAMPLE ID:\s*([A-Za-z0-9\-]+)/i),
    thc:fnum(T,/Total THC\s*\([^)]*\)\s+([\d.]+)/i),
    cbd:fnum(T,/Total CBD\s*\([^)]*\)\s+([\d.]+)/i),
    moisture:null,
    terps:fnum(T,/Total Terpenes\s*\([^)]*\)\s+([\d.]+)/i),
    received:normDate(fstr(T,/DATE RECEIVED:\s*([\d\-]{8,10})/i)),
    micros:microPanel(T),micro:microStatus(T),pest:pestStatus(T),supplier:null,
  }),
  'Eurofins':T=>({
    strain:euStrain(T),
    id:euLot(T),
    thc:fnum(T,/Total THC - %w\/w \(as-is\)\s+([\d.]+)/i)||fnum(T,/Total THC - %w\/w \(Anhydrous\)\s+([\d.]+)/i),
    cbd:fnum(T,/Total CBD - %w\/w \(as-is\)\s+([\d.]+)/i)||fnum(T,/Total CBD - %w\/w \(Anhydrous\)\s+([\d.]+)/i),
    moisture:fnum(T,/Loss on drying\s+([\d.]+)\s*%/i),
    terps:fnum(T,/Total Terpenes\s*\([^)]*\)\s+([\d.]+)/i),
    received:normDate(fstr(T,/Received On:\s*([0-9]{1,2}[A-Za-z]{3}[0-9]{4})/i)),
    micros:microPanel(T),micro:microStatus(T),pest:pestStatus(T),supplier:null,
  }),
  'Pathogenia':T=>({
    strain:null,
    id:fstr(T,/Sample Name\s*:?\s*([A-Za-z0-9]+)/i)||fstr(T,/Sample ID\s*:?\s*([A-Za-z0-9]+)/i),
    thc:fnum(T,/Total THC\s+[\d.]+\s+([\d.]+)\s+[\d.]+/i),
    cbd:fnum(T,/Total CBD\s+[\d.]+\s+([\d.]+)\s+[\d.]+/i),
    moisture:null,terps:null,
    received:normDate(fstr(T,/Sample Receiving Date\s*:?\s*([\dA-Za-z\-]+)/i)),
    micros:microPanel(T),micro:microStatus(T),pest:pestStatus(T),supplier:null,
  }),
  'High North':T=>({
    strain:fstr(T,/Product:\s*(.+?)(?:\s+\d|\s+Lot:|\s+Matrix:)/i),
    id:fstr(T,/Lot:\s*([A-Za-z0-9\-]+)/i),
    thc:fnum(T,/Total THC\s*[\[(].*?[\])]\s+([\d.]+)/i),
    cbd:fnum(T,/Total CBD\s*[\[(].*?[\])]\s+([\d.]+)/i),
    moisture:fnum(T,/Loss on Drying\s*\([^)]*\)\s*([\d.]+)/i),
    terps:fnum(T,/Total Terpenes\s*\([^)]*\)?\s*[\d.]*\s*([\d.]+)/i),
    received:normDate(fstr(T,/Received:\s*([\d\-]{8,10})/i)),
    micros:microPanel(T),micro:microStatus(T),pest:pestStatus(T),
    supplier:fstr(T,/Client:\s*[~\s]*(.+?)\s+Product:/i)||fstr(T,/Name:\s*(.+?)\s+Matrix:/i),
  }),
};
function parseCoa(rawText){
  const T=String(rawText||'').replace(/\s+/g,' ').trim();
  const lab=detectLab(T);
  const o={lab:lab||null};
  if(lab&&PARSERS[lab])Object.assign(o,PARSERS[lab](T));
  else { // generic fallback
    o.strain=fstr(T,/(?:strain|cultivar|product\s*name)\s*[:\-]?\s*([A-Za-z0-9][A-Za-z0-9 '\-]{2,30})/i);
    o.id=fstr(T,/(?:lot|sample|batch)\s*(?:#|no\.?|id)?\s*[:\-]?\s*([A-Z0-9][A-Z0-9\-\/]{3,20})/i);
    o.thc=fnum(T,/total\s*thc[^\d%]*?([\d.]+)\s*%/i);
    o.cbd=fnum(T,/total\s*cbd[^\d%]*?([\d.]+)\s*%/i);
    o.moisture=fnum(T,/(?:loss\s*on\s*drying|moisture)[^\d%]*?([\d.]+)\s*%/i);
    o.terps=fnum(T,/total\s*terpenes?[^\d%]*?([\d.]+)\s*%/i);
    o.micros=microPanel(T); o.micro=microStatus(T); o.pest=pestStatus(T); o.supplier=null;
  }
  Object.keys(o).forEach(k=>{ if(o[k]===''||o[k]===undefined)o[k]=null; });
  return o;
}

/* ---- OCR fallback for scanned / image-only CoAs (e.g. High North) ---- */
function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=()=>rej(new Error('Could not load '+src));document.head.appendChild(s);});}
async function loadTesseract(){ if(!window.Tesseract)await loadScript('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'); }
async function renderPageCanvas(page,rotation,targetMax){
  let vp=page.getViewport({scale:1,rotation});
  const scale=targetMax/Math.max(vp.width,vp.height);
  vp=page.getViewport({scale,rotation});
  const cv=document.createElement('canvas'); cv.width=Math.ceil(vp.width); cv.height=Math.ceil(vp.height);
  await page.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
  return cv;
}
function scoreText(t){ if(!t)return 0; const words=(t.match(/[A-Za-z]{3,}/g)||[]).length; const hit=/high north|certificate|cannabis|total thc|lot/i.test(t)?25:0; return words+hit; }
async function ocrPdf(file,onProgress){
  await loadTesseract();
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const worker=await Tesseract.createWorker('eng');
  try{
    onProgress&&onProgress('Detecting orientation…');
    const p1=await pdf.getPage(1); let best={rot:0,score:-1};
    for(const rot of [0,90,180,270]){
      const cv=await renderPageCanvas(p1,rot,1500);
      const {data}=await worker.recognize(cv);
      const sc=scoreText(data.text); if(sc>best.score)best={rot,score:sc};
    }
    let all='';
    for(let i=1;i<=pdf.numPages;i++){
      onProgress&&onProgress(`OCR page ${i} of ${pdf.numPages}…`);
      const pg=await pdf.getPage(i);
      const cv=await renderPageCanvas(pg,best.rot,3000);
      const {data}=await worker.recognize(cv);
      all+=data.text+'\n';
    }
    return all.trim();
  } finally { await worker.terminate(); }
}

/* ============================ chrome: theme ============================ */
function applyTheme(){const t=load('coa.theme','dark');document.documentElement.setAttribute('data-theme',t);$('#themeToggle').innerHTML=t==='dark'?MOON:SUN;}
$('#themeToggle').addEventListener('click',()=>{const t=load('coa.theme','dark')==='dark'?'light':'dark';save('coa.theme',t);applyTheme();});

/* ============================ events ============================ */
let toastT;
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);}
$('#nav').addEventListener('click',e=>{
  const it=e.target.closest('.nav-item');if(!it)return;
  if(it.dataset.spectype!==undefined){showPage('type:'+it.dataset.spectype);return;}
  if(it.dataset.sup!==undefined){supFilter=it.dataset.sup;showPage('library');return;}
  if(it.dataset.page)showPage(it.dataset.page);
});
$('#main').addEventListener('click',e=>{
  const docs=e.target.closest('[data-coa-docs]');
  if(docs){openCoaDocs(docs.dataset.coaDocs);return;}
  const dec=e.target.closest('[data-decide]');
  if(dec){e.stopPropagation();decide(dec.dataset.id,dec.dataset.decide);return;}
  const go=e.target.closest('[data-go]');
  if(go){showPage(go.dataset.go);return;}
  if(e.target.closest('[data-type-back]')){showPage('type:'+intakeType);return;}
  if(e.target.closest('[data-back]')){showPage('library');return;}
  const ph=e.target.closest('.panel-head[data-sup-panel]');
  if(ph){toggleSupCollapse(ph.dataset.supPanel);return;}
  const row=e.target.closest('[data-lot]');
  if(row){lotFrom=curPage;showPage('lot:'+row.dataset.lot);return;}
});
function toggleSupCollapse(s){
  const set=new Set(load('coa.collapsedSups',[]));
  if(set.has(s))set.delete(s); else set.add(s);
  save('coa.collapsedSups',[...set]);
  const lb=$('#libBody'); if(lb)lb.innerHTML=libBody();
}
function decide(id,what){
  const l=LOTS.find(x=>x.id===id); if(!l)return;
  if(what==='clear'){l.approval=null;l.approvedAt=null;l.approvedBy=null;toast('Moved back to undecided');}
  else{l.approval=what;l.approvedAt=new Date().toISOString().slice(0,10);l.approvedBy='Jeremy Gagnon';
    toast(what==='approved'?'Lot approved':'Lot rejected');}
  saveLots();showPage(curPage);
}
$('#footnote').innerHTML='Mera Cannabis — CoA review &amp; supplier-lot spec compliance. Each lot is judged against the <b>per-product-type spec</b> for its type (Pre-Rolls, Infusion Low/High, Hydrocarbon Extraction, GMP Distillate); spec thresholds are saved in this browser, and the lot library is shared across everyone when cloud sync is on (status shown in the sidebar). '+
  'Use <b>Add sample</b> on the Home page (or a flower-type page) to log a CoA — choose its flower type, attach the certificate PDF and the lab results are parsed locally. New samples wait in <b>Outstanding Samples</b> until you approve or reject them.';
