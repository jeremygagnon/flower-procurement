<style>
:root{
  --bg:#161a23; --panel:#1e2330; --panel-2:#191e29; --inset:#12161f;
  --ink:#f2f3f5; --ink-2:#c4c8d4; --muted:#878ea0; --faint:#565d72;
  --line:#2c3347; --line-2:#232a3a;
  --ctrl-bg:#313c58; --ctrl-bg-h:#3e4c70;
  --teal:#3ddc8a; --teal-bright:#5ee3a0; --amber:#f0b73d; --coral:#ff6b5c; --lav:#a78bfa;
  --accent:#ff7a3d; --accent-soft:#3a2316;
  --flower:#e879b9; --pre:#5b9bf0; --vape:#f0b73d; --ext:#97cf3f; --hash:#a78bfa;
  --kpi-a-bg:#16271f; --kpi-a-bd:#244536;
  --kpi-b-bg:#201c2e; --kpi-b-bd:#352c4d;
  --kpi-c-bg:#2a1d15; --kpi-c-bd:#48301d;
  --card-elev:inset 0 1px 0 rgba(255,255,255,.05),0 8px 24px rgba(0,0,0,.30);
  --font:'Syne',-apple-system,system-ui,sans-serif;
  --mono:'DM Mono',ui-monospace,Menlo,monospace;
}
:root[data-theme="light"]{
  /* Dimmed "soft daylight" — surfaces pulled well below pure white to cut glare (matches S&OP) */
  --bg:#c7ccd4; --panel:#dce1e8; --panel-2:#d2d8e0; --inset:#c3cad3;
  --ink:#222b3a; --ink-2:#465162; --muted:#5d6776; --faint:#8992a0;
  --line:#b5bec9; --line-2:#c9d1db;
  --ctrl-bg:#e5eaf0; --ctrl-bg-h:#d6dfec;
  --teal:#1a7a4a; --teal-bright:#15824f; --amber:#b87000; --coral:#c0392b; --lav:#7c3aed;
  --accent:#e8622a; --accent-soft:#e3d3c8;
  --flower:#b83280; --pre:#1a5fa8; --vape:#b87000; --ext:#638f1c; --hash:#7c3aed;
  --kpi-a-bg:#d2e0d7; --kpi-a-bd:#b8d0c2;
  --kpi-b-bg:#d8d3ea; --kpi-b-bd:#c4bade;
  --kpi-c-bg:#e5dad0; --kpi-c-bd:#d1bbaa;
  --card-elev:inset 0 1px 0 rgba(255,255,255,.5),0 6px 18px rgba(15,23,42,.09);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;transition:background .2s ease,color .2s ease;}
body{padding:28px clamp(16px,3vw,40px) 64px;max-width:1320px;margin:0 auto;}
.mono{font-family:var(--mono);}
.tnum{font-variant-numeric:tabular-nums;}
.muted{color:var(--muted);} .faint{color:var(--faint);}
a{color:inherit;}

/* topbar */
.topbar{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:18px;padding-bottom:20px;margin-bottom:24px;border-bottom:1px solid var(--line);}
.brand{display:flex;align-items:center;gap:14px;}
.brand-logo{height:38px;width:auto;display:block;flex-shrink:0;}
.brand-div{width:1px;height:33px;background:var(--line);flex-shrink:0;}
.brand h1{font-size:26.5px;font-weight:600;letter-spacing:-0.01em;line-height:1.1;}
.brand .sub{font-size:11px;font-family:var(--mono);color:var(--muted);letter-spacing:0.04em;margin-top:3px;}
.period{display:flex;align-items:center;gap:10px;}
.icon-btn{width:36px;height:36px;border-radius:9px;border:1px solid var(--line);background:var(--panel-2);color:var(--muted);display:grid;place-items:center;cursor:pointer;transition:color .15s,border-color .15s,background .15s;flex-shrink:0;}
.icon-btn:hover{color:var(--ink);background:var(--accent-soft);}
.btn-primary{font-family:var(--font);font-weight:600;font-size:13px;border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:9px;padding:0 14px;height:36px;display:inline-flex;align-items:center;gap:7px;cursor:pointer;transition:filter .14s;}
.btn-primary:hover{filter:brightness(1.08);}

/* layout */
.layout{display:grid;grid-template-columns:214px 1fr;gap:26px;align-items:start;}
.sidebar{position:sticky;top:20px;}
.nav{display:flex;flex-direction:column;gap:3px;background:var(--panel);border:1px solid transparent;border-radius:16px;padding:10px;box-shadow:var(--card-elev);}
.nav-sec{font-size:11px;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.1em;color:var(--ink);font-weight:700;padding:7px 11px;margin:13px 0 6px;background:var(--panel-2);border-left:3px solid var(--accent);border-radius:7px;}
.nav-sec:first-child{margin-top:2px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;cursor:pointer;color:var(--ink-2);font-size:15px;font-weight:500;text-transform:capitalize;transition:background .14s,color .14s;}
.nav-item:hover{background:var(--panel-2);color:var(--ink);}
.nav-item.active{background:var(--accent-soft);color:var(--accent);}
.nav-item .ni-ico{display:grid;place-items:center;width:18px;flex-shrink:0;}
.nav-item .ni-count{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--faint);}
.nav-item.active .ni-count{color:var(--accent);}
.nav-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.nav-sync{font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:0.06em;text-align:center;padding:11px 0 0;display:flex;align-items:center;justify-content:center;gap:6px;}
.nav-sync:empty{display:none;}
.nav-sync::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--faint);flex-shrink:0;}
.nav-sync.ok::before{background:#3fb950;}
.nav-sync.sync::before{background:var(--accent);}
.nav-sync.err::before{background:#f85149;}
.nav-ver{font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:0.1em;text-align:center;padding:11px 0 2px;}
.nav-built{font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:0.06em;text-align:center;padding:0 0 4px;opacity:.8;}

/* eyebrow + heads */
.eyebrow{font-size:10px;color:var(--ink-2);font-weight:700;font-family:var(--mono);letter-spacing:0.14em;text-transform:uppercase;display:flex;align-items:center;gap:9px;margin-bottom:14px;background:var(--panel-2);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:8px;padding:9px 13px;}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px;}
.page-head h2{font-size:21px;font-weight:600;letter-spacing:-0.01em;}
.page-head p{font-size:12px;color:var(--muted);font-family:var(--mono);margin-top:4px;max-width:62ch;line-height:1.55;}

/* kpi */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;}
.kpi .kname{font-size:10px;font-weight:700;font-family:var(--mono);letter-spacing:0.09em;text-transform:uppercase;color:var(--ink-2);margin-bottom:11px;}
.kpi .big{font-size:36px;font-weight:700;font-family:var(--mono);line-height:0.95;letter-spacing:-0.01em;}
.kpi .big .unit{font-size:13px;color:var(--faint);font-weight:400;margin-left:4px;}
.kpi .sub{font-size:10.5px;font-family:var(--mono);color:var(--muted);margin-top:8px;}
.kpi.ka{background:var(--kpi-a-bg);border-color:var(--kpi-a-bd);} .kpi.ka .kname{color:var(--teal-bright);}
.kpi.kb{background:var(--kpi-b-bg);border-color:var(--kpi-b-bd);} .kpi.kb .kname{color:var(--lav);}
.kpi.kc{background:var(--kpi-c-bg);border-color:var(--kpi-c-bd);} .kpi.kc .kname{color:var(--accent);}

/* toolbar */
.toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
.search{flex:1;min-width:220px;display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:0 12px;height:38px;}
.search input{flex:1;background:transparent;border:none;outline:none;color:var(--ink);font-family:var(--font);font-size:13.5px;}
.search svg{color:var(--faint);flex-shrink:0;}
.seg-slider{position:relative;display:inline-grid;grid-auto-flow:column;background:var(--ctrl-bg);border-radius:9px;padding:3px;border:1px solid var(--line);}
.seg{position:relative;z-index:1;font-size:12px;padding:7px 13px;border-radius:6px;border:none;cursor:pointer;background:transparent;color:var(--muted);font-family:var(--font);font-weight:500;transition:color .15s,background .15s;white-space:nowrap;}
.seg:hover{color:var(--ink-2);}
.seg.active{color:#fff;background:var(--accent);}
:root[data-theme="light"] .seg.active{color:#fff;}

/* supplier stats view */
.stats-body{padding:4px 16px 16px;}
.stat-tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:12px 0 14px;}
.stat-tile{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:13px 15px;}
.st-k{font-size:9.5px;font-weight:700;font-family:var(--mono);letter-spacing:0.09em;text-transform:uppercase;color:var(--muted);}
.st-v{font-size:27px;font-weight:700;font-family:var(--mono);line-height:1;letter-spacing:-0.01em;margin-top:10px;}
.st-v.accent{color:var(--accent);} .st-v.lav{color:var(--lav);}
.st-s{font-size:10px;font-family:var(--mono);color:var(--muted);margin-top:9px;}
.spark-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.spark-card{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:12px 15px 9px;}
.spark-head{display:flex;align-items:center;justify-content:space-between;font-family:var(--mono);font-size:9.5px;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.spark-last{font-weight:700;font-size:12px;}
.spark-last.accent{color:var(--accent);} .spark-last.lav{color:var(--lav);}
.spark{width:100%;height:70px;display:block;}
.spark-empty,.spark-note{font-family:var(--mono);font-size:10.5px;color:var(--faint);text-align:center;}
.spark-empty{padding:24px 0;} .spark-note{padding:5px 0 2px;}
.stats-table tbody tr{cursor:pointer;}

/* panels + table */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:20px;}
.panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 16px;background:var(--panel-2);border-bottom:1px solid var(--line);}
.panel-head .ph-t{font-size:13px;font-weight:600;display:flex;align-items:center;gap:9px;}
.panel-head .ph-t .dot{width:9px;height:9px;border-radius:50%;}
.panel-head .ph-meta{font-family:var(--mono);font-size:11px;color:var(--muted);}
.panel-head[data-sup-panel]{cursor:pointer;user-select:none;}
.panel-head[data-sup-panel] .chevron{flex:none;color:var(--muted);transition:transform .15s ease;}
.panel-head[data-sup-panel]:hover .ph-t{color:var(--accent);}
.panel:not(.collapsed) .panel-head[data-sup-panel] .chevron{transform:rotate(90deg);}
.panel.collapsed table{display:none;}
.panel.collapsed .panel-head[data-sup-panel]{border-bottom:none;}
table{width:100%;border-collapse:collapse;}
th{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);font-weight:500;text-align:right;padding:10px 14px;border-bottom:1px solid var(--line);white-space:nowrap;}
th.l,td.l{text-align:left;}
td{padding:11px 14px;border-bottom:1px solid var(--line-2);font-size:13px;text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums;white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tbody tr{transition:background .12s;cursor:pointer;}
tbody tr:hover{background:var(--panel-2);}
.lotid{font-weight:500;color:var(--ink);}
.strain{font-family:var(--font);font-weight:600;font-size:13px;color:var(--ink);text-align:left;}
.strain .s2{display:block;font-family:var(--mono);font-weight:400;font-size:10.5px;color:var(--muted);margin-top:2px;}
.catdot{display:inline-flex;align-items:center;gap:7px;font-family:var(--font);font-size:12px;color:var(--ink-2);}
.catdot .dot{width:8px;height:8px;border-radius:50%;}

/* verdict chips */
.chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10.5px;font-weight:500;letter-spacing:0.04em;padding:3px 9px;border-radius:999px;text-transform:uppercase;}
.chip::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;}
.v-pass{color:var(--teal-bright);background:color-mix(in srgb,var(--teal) 14%,transparent);}
.v-review{color:var(--amber);background:color-mix(in srgb,var(--amber) 14%,transparent);}
.v-fail{color:var(--coral);background:color-mix(in srgb,var(--coral) 15%,transparent);}
.v-await{color:var(--lav);background:color-mix(in srgb,var(--lav) 14%,transparent);}
.age-fresh{color:var(--teal-bright);background:color-mix(in srgb,var(--teal) 15%,transparent);}
.age-mid{color:var(--amber);background:color-mix(in srgb,var(--amber) 16%,transparent);}
.age-old{color:var(--coral);background:color-mix(in srgb,var(--coral) 16%,transparent);}
.age-flag{display:inline-block;font-family:var(--mono);font-size:9.5px;font-weight:500;line-height:1.6;padding:0 6px;border-radius:6px;vertical-align:middle;white-space:nowrap;}
.cell-flag{color:var(--coral);} .cell-ok{color:var(--ink);}

/* flower procurement schedule */
.sched-badge .tb{white-space:nowrap;}
.sched-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:18px;box-shadow:var(--card-elev);}
.sched-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
.sched-name{font-size:13px;font-weight:600;display:flex;align-items:center;gap:9px;}
.sched-name .dot{width:9px;height:9px;border-radius:50%;}
.badges{display:flex;gap:8px;flex-wrap:wrap;}
.tb{font-family:var(--mono);font-size:10.5px;letter-spacing:0.04em;padding:4px 10px;border-radius:999px;background:var(--panel-2);border:1px solid var(--line);color:var(--muted);}
.tb-vol{color:var(--teal-bright);background:color-mix(in srgb,var(--teal) 12%,transparent);border-color:transparent;}
.cash{font-family:var(--mono);}
.stat-row{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:18px;}
.stat{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:13px 14px;}
.stat .k{font-size:9px;font-weight:700;font-family:var(--mono);letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-2);margin-bottom:8px;}
.stat .v{font-size:21px;font-weight:700;font-family:var(--mono);line-height:1;letter-spacing:-0.01em;}
.stat .s{font-size:9.5px;font-family:var(--mono);color:var(--muted);margin-top:7px;line-height:1.45;}
.stat .v.teal{color:var(--teal-bright);} .stat .v.lav{color:var(--lav);} .stat .v.amber{color:var(--amber);}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:16px;}
.leg{display:flex;align-items:center;gap:7px;font-size:11.5px;font-family:var(--mono);color:var(--ink-2);}
.leg-sq{width:11px;height:11px;border-radius:3px;flex-shrink:0;}
.sched-chart{display:grid;grid-auto-flow:column;grid-auto-columns:1fr;gap:16px;height:230px;align-items:end;padding-top:20px;}
.sc-col{height:100%;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:6px;}
.sc-tot{font-size:9.5px;font-family:var(--mono);color:var(--faint);min-height:13px;}
.sc-bar{width:64%;max-width:52px;display:flex;flex-direction:column-reverse;border-radius:5px 5px 0 0;overflow:hidden;min-height:2px;}
.sc-seg{width:100%;}
.sched-xaxis{display:grid;grid-auto-flow:column;grid-auto-columns:1fr;gap:16px;margin:8px 0 4px;border-top:1px solid var(--line);padding-top:9px;}
.sched-xaxis>div{text-align:center;font-size:10.5px;font-family:var(--mono);color:var(--muted);}
.mtable{margin-top:18px;}
.mrow{display:grid;align-items:center;border-bottom:1px solid var(--line-2);}
.mrow>div{padding:10px 8px;text-align:right;font-family:var(--mono);font-size:12px;font-variant-numeric:tabular-nums;white-space:nowrap;}
.mrow.head{border-bottom:1px solid var(--line);}
.mrow.head>div{font-size:9px;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);padding:9px 8px;}
.mrow.head>div:first-child{text-align:left;}
.mc-month{text-align:left!important;display:flex;align-items:center;gap:9px;}
.mc-month .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.skf-d{display:flex;flex-direction:column;font-family:var(--font);font-weight:600;font-size:12.5px;color:var(--ink);}
.skf-d small{font-family:var(--mono);font-weight:400;font-size:10px;color:var(--muted);margin-top:2px;}
.mc-cell.teal{color:var(--teal-bright);}
.mrow .muted{color:var(--faint);}
.skf-tot{border-bottom:none;border-top:1px solid var(--line);font-weight:600;}
.skf-tot .mc-month{font-family:var(--mono);font-size:11px;color:var(--ink-2);font-weight:600;}
.sched-note{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:14px;line-height:1.55;}
@media(max-width:820px){.stat-row{grid-template-columns:repeat(3,1fr);}}

/* approval status */
.appr-btn{font-family:var(--mono);font-size:10.5px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;padding:4px 12px;border-radius:999px;cursor:pointer;color:var(--accent);background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 35%,transparent);transition:background .15s,color .15s;}
.appr-btn:hover{background:var(--accent);color:#fff;}
.appr-chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10.5px;font-weight:500;letter-spacing:0.04em;padding:3px 9px;border-radius:999px;text-transform:uppercase;cursor:pointer;color:var(--teal-bright);background:color-mix(in srgb,var(--teal) 14%,transparent);}
.appr-chip::before{content:"✓";font-size:11px;}
.appr-chip:hover{background:color-mix(in srgb,var(--teal) 22%,transparent);}
.appr-pending{font-family:var(--mono);font-size:10.5px;letter-spacing:0.04em;text-transform:uppercase;color:var(--muted);}
.appr-actions{display:inline-flex;gap:6px;align-items:center;}
.rej-btn{font-family:var(--mono);font-size:10.5px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;padding:4px 12px;border-radius:999px;cursor:pointer;color:var(--coral);background:color-mix(in srgb,var(--coral) 12%,transparent);border:1px solid color-mix(in srgb,var(--coral) 35%,transparent);transition:background .15s,color .15s;}
.rej-btn:hover{background:var(--coral);color:#fff;}
.rej-chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10.5px;font-weight:500;letter-spacing:0.04em;padding:3px 9px;border-radius:999px;text-transform:uppercase;cursor:pointer;color:var(--coral);background:color-mix(in srgb,var(--coral) 13%,transparent);}
.rej-chip::before{content:"✕";font-size:10px;}
.rej-chip:hover{background:color-mix(in srgb,var(--coral) 20%,transparent);}
/* lot-detail page: larger, right-aligned decision controls */
.lot-appr .appr-actions{gap:9px;}
.lot-appr .appr-btn,.lot-appr .rej-btn{font-size:12.5px;padding:9px 22px;border-radius:10px;}
.lot-appr .appr-chip,.lot-appr .rej-chip{font-size:12px;padding:7px 15px;}
.lot-appr .appr-chip::before{font-size:12px;}
.lot-appr .rej-chip::before{font-size:11px;}

/* spec form */
.spec-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.spec-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;}
.spec-card h4{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.spec-card .sd{font-family:var(--mono);font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:13px;}
.field-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.field-row label{font-family:var(--mono);font-size:11px;color:var(--ink-2);width:118px;flex-shrink:0;}
.field-row input,.rv input,.rv select{background:var(--inset);border:1px solid var(--line);border-radius:8px;padding:8px 11px;color:var(--ink);font-family:var(--mono);font-size:13px;outline:none;transition:border-color .14s;width:100%;}
.field-row input{width:110px;}
.field-row input:focus,.rv input:focus,.rv select:focus{border-color:var(--accent);}
.field-row .u{font-family:var(--mono);font-size:11px;color:var(--faint);}
.seg-pf{display:inline-grid;grid-auto-flow:column;background:var(--ctrl-bg);border-radius:8px;padding:2px;border:1px solid var(--line);}
.seg-pf button{font-size:11px;padding:5px 11px;border-radius:6px;border:none;background:transparent;color:var(--muted);font-family:var(--mono);cursor:pointer;}
.seg-pf button.on{background:var(--accent);color:#fff;}

/* intake */
.intake-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:18px;align-items:start;}
.drop{border:1.5px dashed var(--line);border-radius:14px;padding:34px 20px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;background:var(--panel);}
.drop:hover,.drop.over{border-color:var(--accent);background:var(--accent-soft);}
.drop .di{color:var(--accent);margin-bottom:10px;}
.drop .dt{font-size:14px;font-weight:600;}
.drop .ds{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:5px;}
.hint{font-family:var(--mono);font-size:11px;color:var(--muted);line-height:1.6;margin:12px 0;}
.parse-note{font-family:var(--mono);font-size:11.5px;padding:9px 12px;border-radius:9px;margin-top:12px;display:none;}
.parse-note.show{display:block;}
.parse-note.ok{color:var(--teal-bright);background:color-mix(in srgb,var(--teal) 13%,transparent);}
.parse-note.warn{color:var(--amber);background:color-mix(in srgb,var(--amber) 13%,transparent);}
.parse-note.err{color:var(--coral);background:color-mix(in srgb,var(--coral) 13%,transparent);}
.rawbox{margin-top:14px;display:none;}
.rawbox summary{font-family:var(--mono);font-size:11px;color:var(--muted);cursor:pointer;}
.rawtext{font-family:var(--mono);font-size:10.5px;color:var(--faint);white-space:pre-wrap;max-height:160px;overflow:auto;margin-top:8px;padding:10px;background:var(--inset);border-radius:9px;border:1px solid var(--line);}
.rv{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;}
.rv h3{font-size:14px;font-weight:600;display:flex;align-items:center;gap:9px;margin-bottom:4px;}
.rv .rvg{display:grid;grid-template-columns:1fr 1fr;gap:11px 14px;margin:14px 0;}
.rv .rvf{display:flex;flex-direction:column;gap:5px;}
.rv .rvf.full{grid-column:1 / -1;}
.rv .rvf label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);}
.rv .rv-sub{margin-top:6px;padding-top:14px;border-top:1px solid var(--line);}
.rv .rv-sub-h{font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px;}
.rv h3 .pt-lock{margin-left:auto;display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);background:var(--inset);border:1px solid var(--line);border-radius:999px;padding:4px 10px;}
.rv h3 .pt-lock .dot{width:8px;height:8px;border-radius:50%;}

/* multi-lot intake table */
.lot-tablewrap{overflow-x:auto;}
.lot-table{width:100%;border-collapse:collapse;min-width:980px;}
.lot-table th{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);font-weight:500;text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);white-space:nowrap;}
.lot-table td{padding:7px 10px;border-bottom:1px solid var(--line-2);text-align:left;vertical-align:top;font-family:var(--font);}
.lot-table tbody tr{cursor:default;transition:none;}
.lot-table tbody tr:hover{background:transparent;}
.lot-table tbody tr:last-child td{border-bottom:none;}
.lot-table input,.lot-table select{background:var(--inset);border:1px solid var(--line);border-radius:8px;padding:7px 9px;color:var(--ink);font-family:var(--mono);font-size:12.5px;outline:none;transition:border-color .14s;width:100%;}
.lot-table input:focus,.lot-table select:focus{border-color:var(--accent);}
.lot-table .c-num input{text-align:right;font-variant-numeric:tabular-nums;}
.coa-btn{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);border-radius:8px;padding:6px 10px;cursor:pointer;white-space:nowrap;transition:filter .14s;}
.coa-btn:hover{filter:brightness(1.08);}
.coa-btn svg{width:13px;height:13px;}
.coa-status{display:block;font-family:var(--mono);font-size:10px;margin-top:5px;color:var(--muted);max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.coa-status.ok{color:var(--teal-bright);} .coa-status.warn{color:var(--amber);} .coa-status.err{color:var(--coral);}
.coa-cell{white-space:nowrap;}
.coa-link{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:12.5px;font-weight:700;color:#fff;background:var(--accent);border:1px solid var(--accent);border-radius:9px;padding:8px 13px;cursor:pointer;text-decoration:none;box-shadow:0 2px 12px color-mix(in srgb,var(--accent) 32%,transparent);transition:filter .14s,transform .14s,box-shadow .14s;}
.coa-link:hover{filter:brightness(1.07);transform:translateY(-1px);}
.coa-link svg{width:14px;height:14px;}
.coa-none-tag{color:var(--muted);}
.coa-add{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:12.5px;font-weight:700;color:var(--accent);background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 45%,transparent);border-radius:9px;padding:8px 13px;cursor:pointer;transition:background .14s,color .14s,transform .14s;}
.coa-add:hover{background:var(--accent);color:#fff;border-color:var(--accent);transform:translateY(-1px);}
.coa-add svg{width:14px;height:14px;}
.coa-add.busy{opacity:.6;pointer-events:none;}
.coa-docs-btn{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:12.5px;font-weight:700;color:#fff;background:var(--accent);border:1px solid var(--accent);border-radius:9px;padding:8px 13px;cursor:pointer;box-shadow:0 2px 12px color-mix(in srgb,var(--accent) 32%,transparent);transition:filter .14s,transform .14s;}
.coa-docs-btn:hover{filter:brightness(1.07);transform:translateY(-1px);}
.coa-docs-btn svg{width:14px;height:14px;}
.coa-modal{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;background:color-mix(in srgb,#000 55%,transparent);backdrop-filter:blur(2px);animation:coaFade .14s ease;}
@keyframes coaFade{from{opacity:0;}to{opacity:1;}}
.coa-modal-card{width:100%;max-width:460px;background:var(--panel);border:1px solid var(--line-2);border-radius:16px;box-shadow:0 24px 60px rgba(0,0,0,.45);overflow:hidden;}
.coa-modal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line);}
.cm-t{font-family:var(--font);font-weight:800;font-size:16px;color:var(--ink);}
.cm-s{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-top:3px;}
.coa-modal-x{flex:none;width:30px;height:30px;border-radius:8px;border:1px solid var(--line-2);background:var(--inset);color:var(--ink-2);font-size:14px;cursor:pointer;transition:background .14s,color .14s,border-color .14s;}
.coa-modal-x:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.coa-modal-list{display:flex;flex-direction:column;gap:8px;padding:16px 18px;max-height:60vh;overflow:auto;}
.coa-doc-row{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:10px;border:1px solid var(--line);background:var(--inset);font-family:var(--mono);font-size:12.5px;color:var(--ink);text-decoration:none;cursor:pointer;transition:border-color .14s,transform .14s;}
.coa-doc-row:hover{border-color:var(--accent);transform:translateY(-1px);}
.coa-doc-row svg{width:16px;height:16px;color:var(--accent);flex:none;}
.cdr-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cdr-dl{flex:none;font-size:11px;font-weight:700;color:var(--accent);}
.coa-doc-row.is-empty{opacity:.5;cursor:default;}
.coa-doc-row.is-empty:hover{border-color:var(--line);transform:none;}
.coa-doc-row.is-empty .cdr-dl{color:var(--muted);}
.coa-replace{margin-left:6px;border:1px solid var(--line);background:transparent;color:var(--muted);border-radius:7px;width:28px;height:30px;cursor:pointer;font-size:13px;vertical-align:middle;transition:color .14s,border-color .14s;}
.coa-replace:hover{color:var(--accent);border-color:var(--accent);}
.coa-tip{position:fixed;z-index:200;background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 30px rgba(0,0,0,.35);padding:10px 12px;min-width:168px;pointer-events:none;font-family:var(--font);}
.coa-tip-row{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:3px 0;}
.coa-tip-row span{color:var(--muted);font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.05em;}
.coa-tip-row b{font-family:var(--mono);font-size:12.5px;font-variant-numeric:tabular-nums;}
.coa-tip .pf{font-family:var(--mono);font-size:11px;font-weight:600;}
.coa-tip .pf.ok{color:var(--teal-bright);} .coa-tip .pf.bad{color:var(--coral);} .coa-tip .pf.na{color:var(--muted);}
.coa-tip-name{margin-top:7px;padding-top:7px;border-top:1px solid var(--line-2);font-family:var(--mono);font-size:10px;color:var(--muted);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.row-del{background:transparent;border:none;color:var(--faint);cursor:pointer;font-size:15px;line-height:1;padding:7px 7px;border-radius:6px;transition:color .14s,background .14s;}
.row-del:hover{color:var(--coral);background:color-mix(in srgb,var(--coral) 12%,transparent);}
.lot-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;background:var(--panel-2);border-top:1px solid var(--line);flex-wrap:wrap;}
.intake-sup{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
.intake-sup label{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);font-weight:500;}
.intake-sup input{flex:1;min-width:220px;max-width:360px;background:var(--inset);border:1px solid var(--line);border-radius:8px;padding:8px 11px;color:var(--ink);font-family:var(--mono);font-size:13px;outline:none;transition:border-color .14s;}
.intake-sup input:focus{border-color:var(--accent);}
.intake-sup select{background:var(--inset);border:1px solid var(--line);border-radius:8px;padding:8px 11px;color:var(--ink);font-family:var(--mono);font-size:13px;outline:none;transition:border-color .14s;cursor:pointer;}
.intake-sup select:focus{border-color:var(--accent);}
.btn-ghost{font-family:var(--font);font-weight:600;font-size:13px;border:1px dashed var(--line);background:transparent;color:var(--ink-2);border-radius:9px;padding:0 14px;height:36px;display:inline-flex;align-items:center;gap:7px;cursor:pointer;transition:border-color .14s,color .14s;}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-ghost svg{width:14px;height:14px;}
/* simplified CoA intake: each dropped certificate becomes a parsed sample card */
.drop{margin:16px;}
.drop .di svg{width:26px;height:26px;}
.coa-items{display:flex;flex-direction:column;}
.coa-item{padding:14px 16px;border-bottom:1px solid var(--line-2);}
.coa-item:last-child{border-bottom:none;}
.coa-item.reading{opacity:.85;}
.ci-head{display:flex;align-items:center;gap:10px;}
.ci-icon{display:inline-flex;color:var(--accent);}
.ci-icon svg{width:15px;height:15px;}
.ci-file{font-family:var(--mono);font-size:12px;color:var(--ink);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:300px;}
.ci-lab{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);background:var(--inset);border:1px solid var(--line);border-radius:999px;padding:3px 9px;}
.ci-head .coa-status{margin:0;}
.ci-head .row-del{margin-left:auto;}
.ci-badge{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);background:var(--inset);border:1px solid var(--line);border-radius:999px;padding:3px 9px;white-space:nowrap;}
.ci-files{display:flex;flex-wrap:wrap;gap:6px 14px;margin:8px 0 0;padding-left:25px;}
.ci-fn{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--muted);}
.ci-fn svg{width:12px;height:12px;color:var(--accent);opacity:.8;}
.ci-fields{display:flex;gap:14px;margin-top:11px;flex-wrap:wrap;}
.ci-fl{display:flex;flex-direction:column;gap:5px;flex:1;min-width:160px;font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);}
.ci-fl input{background:var(--inset);border:1px solid var(--line);border-radius:8px;padding:8px 10px;color:var(--ink);font-family:var(--mono);font-size:13px;text-transform:none;letter-spacing:0;outline:none;transition:border-color .14s;}
.ci-fl input:focus{border-color:var(--accent);}
.ci-metrics{display:flex;flex-wrap:wrap;gap:8px 18px;margin-top:13px;}
.ci-m{display:inline-flex;align-items:baseline;gap:7px;font-family:var(--mono);font-size:12.5px;font-variant-numeric:tabular-nums;color:var(--ink);}
.ci-ml{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);}
.ci-pf{font-family:var(--mono);font-size:11px;font-weight:600;}
.ci-pf.ok{color:var(--teal-bright);} .ci-pf.bad{color:var(--coral);} .ci-pf.na{color:var(--muted);}
.spec-ref{display:flex;align-items:center;justify-content:space-between;gap:14px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 16px;margin-bottom:18px;flex-wrap:wrap;}
.spec-ref.spec-ref-foot{margin:16px 0 0;padding:10px 14px;background:var(--panel-2);}
.spec-ref.spec-ref-foot .btn-ghost{padding:6px 12px;font-size:12px;}
.spec-ref .spec-ref-l{display:flex;flex-direction:column;gap:3px;}
.spec-ref .srk{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);}
.spec-ref .srv{font-family:var(--mono);font-size:12.5px;color:var(--ink);}
.spec-table{min-width:680px;}
.spec-table td{vertical-align:middle;}
.spec-table .seg-pf{display:inline-grid;}

/* detail */
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.kv{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid var(--line-2);font-size:12.5px;}
.kv:last-child{border-bottom:none;}
.kv .k{color:var(--muted);font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:0.05em;}
.kv .v{font-family:var(--mono);font-variant-numeric:tabular-nums;}
.back{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--muted);cursor:pointer;margin-bottom:14px;}
.back:hover{color:var(--accent);}
/* lot-detail header: highlighted meta tags + compact verdict pill */
.lot-head{align-items:center;}
.lot-head-l{flex:1;min-width:0;}
.lot-tags{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-top:13px;}
.coa-row{display:flex;flex-wrap:wrap;align-items:center;justify-content:flex-end;gap:8px;margin:-8px 0 20px;}
.lot-tag{display:inline-flex;align-items:baseline;gap:7px;font-family:var(--mono);font-size:12px;color:var(--ink);background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:6px 11px;}
.lot-tag i{font-style:normal;font-size:9px;font-weight:700;letter-spacing:0.09em;text-transform:uppercase;color:var(--muted);}
.lot-status{margin-left:auto;display:inline-flex;align-items:center;gap:10px;}
.verdict-pill{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-weight:700;font-size:13px;letter-spacing:0.02em;padding:8px 15px;border-radius:999px;border:1px solid;white-space:nowrap;cursor:default;}
.verdict-pill::before{content:"";width:8px;height:8px;border-radius:50%;background:currentColor;flex-shrink:0;}
.vb-pass{color:var(--teal-bright);border-color:color-mix(in srgb,var(--teal) 42%,transparent);background:color-mix(in srgb,var(--teal) 13%,transparent);}
.vb-review{color:var(--amber);border-color:color-mix(in srgb,var(--amber) 42%,transparent);background:color-mix(in srgb,var(--amber) 13%,transparent);}
.vb-fail{color:var(--coral);border-color:color-mix(in srgb,var(--coral) 42%,transparent);background:color-mix(in srgb,var(--coral) 13%,transparent);}
.vb-await{color:var(--lav);border-color:color-mix(in srgb,var(--lav) 42%,transparent);background:color-mix(in srgb,var(--lav) 13%,transparent);}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);font-family:var(--mono);font-size:12px;padding:10px 16px;border-radius:10px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:200;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.footnote{font-family:var(--mono);font-size:10.5px;color:var(--faint);line-height:1.7;border-top:1px solid var(--line);margin-top:30px;padding-top:16px;}
.empty{padding:40px 20px;text-align:center;color:var(--muted);font-family:var(--mono);font-size:12px;}
.home-more{padding:11px 16px;font-family:var(--mono);font-size:11.5px;color:var(--accent);cursor:pointer;border-top:1px solid var(--line);}
.home-more:hover{background:var(--panel-2);}

@media(max-width:980px){ .kpi-row{grid-template-columns:repeat(2,1fr);} .intake-grid,.det-grid,.spec-grid{grid-template-columns:1fr;} }
@media(max-width:760px){
  .layout{grid-template-columns:1fr;}
  .sidebar{position:static;}
  .nav{flex-direction:row;overflow-x:auto;gap:6px;padding-bottom:8px;}
  .nav-sec,.nav-ver,.nav-item .ni-count{display:none;}
  .nav-item{white-space:nowrap;}
  .brand h1{font-size:20px;} .brand-logo{height:30px;} .brand-div{height:26px;}
}
</style>

/* Persist lot metadata only — never the base64 PDF bytes. Storing the
   attached PDFs (1–2 MB each as data URLs) overflows the ~5 MB localStorage
   quota, which then silently fails EVERY save (specs included). The bytes
   stay on the in-memory LOTS for this session (download still works) and the
   source PDF is always reachable via the SharePoint coaUrl. */
function slimLot(l){
  if(!l.coaData&&!(l.coaFiles&&l.coaFiles.length))return l;
  const c=Object.assign({},l); delete c.coaData;
  if(c.coaFiles)c.coaFiles=c.coaFiles.map(f=>({name:f.name}));
  return c;
}
function saveLots(){const ok=save('coa.lots',LOTS.map(slimLot)); cloudPushDebounced(); return ok;} function saveSpecs(){return save('coa.specs',SPECS);}

function cloudHeaders(extra){ return Object.assign({apikey:SUPABASE.anonKey,Authorization:'Bearer '+SUPABASE.anonKey,'Content-Type':'application/json'}, extra||{}); }
function setSync(state){ const el=$('#navSync'); if(!el)return; el.className='nav-sync '+state; el.textContent={off:'On this device',sync:'Syncing…',ok:'Synced',err:'Offline — saved locally'}[state]||''; }
function restoreBytes(l,prev){ if(!prev)return l; if(prev.coaData&&!l.coaData)l.coaData=prev.coaData; if(prev.coaFiles&&l.coaFiles)l.coaFiles=l.coaFiles.map(f=>{const pf=prev.coaFiles.find(p=>p.name===f.name);return (pf&&pf.data)?Object.assign({},f,{data:pf.data}):f;}); return l; }
function onIntakePage(){ return curPage==='intake'||curPage.slice(0,7)==='intake:'; }
async function cloudPull(){
  if(!cloudOn()||cloudPulling)return;
  cloudPulling=true; setSync('sync');
  try{
    const r=await fetch(SUPABASE.url+'/rest/v1/lots?select=data&order=updated_at.desc',{headers:cloudHeaders()});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const rows=await r.json();
    const cloud=rows.map(x=>x.data).filter(Boolean);
    const cloudIds=new Set(cloud.map(l=>String(l.id)));
    const localById={}; LOTS.forEach(l=>{localById[String(l.id)]=l;});
    const localOnly=LOTS.filter(l=>!cloudIds.has(String(l.id)));   // added on this device, not yet pushed
    const before=JSON.stringify(LOTS.map(slimLot));
    LOTS=localOnly.concat(cloud.map(l=>restoreBytes(l,localById[String(l.id)])));
    save('coa.lots',LOTS.map(slimLot));
    setSync('ok');
    if(localOnly.length)cloudPushAll();
    if(JSON.stringify(LOTS.map(slimLot))!==before && !onIntakePage())showPage(curPage);
  }catch(e){ setSync('err'); }
  finally{ cloudPulling=false; }
}
function cloudPushAll(){
  if(!cloudOn())return;
  const body=LOTS.map(l=>({id:String(l.id),data:slimLot(l),updated_at:new Date().toISOString()}));
  if(!body.length){ setSync('ok'); return; }
  setSync('sync');
  fetch(SUPABASE.url+'/rest/v1/lots',{method:'POST',headers:cloudHeaders({Prefer:'resolution=merge-duplicates,return=minimal'}),body:JSON.stringify(body)})
    .then(r=>{ if(!r.ok)throw new Error('HTTP '+r.status); setSync('ok'); })
    .catch(()=>{ setSync('err'); toast('Cloud save failed — changes kept on this device'); });
}
function cloudPushDebounced(){ if(!cloudOn())return; clearTimeout(cloudPushT); setSync('sync'); cloudPushT=setTimeout(cloudPushAll,400); }
function cloudInit(){
  if(!cloudOn()){ setSync('off'); return; }
  cloudPull();
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden)cloudPull(); });
  setInterval(()=>{ if(!document.hidden)cloudPull(); },45000);
}
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function fmtN(v){if(v==null)return'—';return Math.round(v).toLocaleString();}
function fmtK(v){if(v==null)return'—';const a=Math.abs(v);if(a>=1e6)return(v/1e6).toFixed(2)+'M';if(a>=1000)return(v/1000).toFixed(1)+'k';return Math.round(v).toString();}
function fmtMoneyK(v){if(v==null)return'—';return'<span class="cash">$'+fmtK(v)+'</span>';}
const num=(v,d=1)=>v==null||isNaN(v)?'—':(+v).toFixed(d);
function suppliers(){return [...new Set(LOTS.map(l=>l.supplier))].sort();}

/* ============================ verdict engine ============================ */
function mMin(v,min,marg){ if(v==null)return{s:'review',note:'no value'}; if(v>=min)return{s:'pass'}; if(v>=min*(1-marg))return{s:'review',note:'below target'}; return{s:'fail',note:'below target'};}
function mBand(v,min,max,marg){ if(v==null)return{s:'review',note:'no value'}; if(v<min)return v>=min*(1-marg)?{s:'review',note:'below target'}:{s:'fail',note:'below target'}; if(max!=null&&v>max)return v<=max*(1+marg)?{s:'review',note:'over target'}:{s:'fail',note:'over target'}; return{s:'pass'};}
function mMax(v,max,marg){ if(v==null)return{s:'review',note:'no value'}; if(v<=max)return{s:'pass'}; if(v<=max*(1+marg))return{s:'review',note:'over limit'}; return{s:'fail',note:'over limit'};}
function mPF(v,req){ if(!req)return{s:'pass'}; if(v==='pass')return{s:'pass'}; if(v==='fail')return{s:'fail',note:'failed panel'}; return{s:'review',note:'no result'};}
function specFor(l){return SPECS[l.ptype]||SPECS[PTYPES[0]]||SPECS_DEF['Pre-Rolls'];}
function verdict(l){
  if(l.status==='awaiting')return{overall:'await',label:'Awaiting CoA',metrics:[],reasons:['No certificate uploaded yet.']};
  const S=specFor(l);
  const m=[];
  if(S.thc&&(S.thc.min!=null||S.thc.max!=null))m.push({key:'thc',label:'Total THC',val:l.thc,unit:'%',...mBand(l.thc,S.thc.min,S.thc.max,0.10)});
  if(S.moisture&&(S.moisture.min!=null||S.moisture.max!=null))m.push({key:'moisture',label:'Loss on drying',val:l.moisture,unit:'%',...mBand(l.moisture,S.moisture.min,S.moisture.max,0.05)});
  if(S.aw&&S.aw.max!=null)m.push({key:'aw',label:'Water activity',val:l.aw,unit:'aw',...mMax(l.aw,S.aw.max,0.05)});
  if(S.terps&&S.terps.min!=null&&S.terps.min>0)m.push({key:'terps',label:'Total terpenes',val:l.terps,unit:'%',...mMin(l.terps,S.terps.min,0.10)});
  if(S.micro)m.push({key:'micro',label:'Microbial',val:l.micro,...mPF(l.micro,S.micro)});
  if(S.pest)m.push({key:'pest',label:'Pesticides',val:l.pest,...mPF(l.pest,S.pest)});
  if(S.metals)m.push({key:'metals',label:'Heavy metals',val:l.metals,...mPF(l.metals,S.metals)});
  if(S.foreign)m.push({key:'foreign',label:'Foreign matter',val:l.foreign,...mPF(l.foreign,S.foreign)});
  let overall='pass';
  if(m.some(x=>x.s==='fail'))overall='fail';
  else if(m.some(x=>x.s==='review'))overall='review';
  const reasons=m.filter(x=>x.s!=='pass').map(x=>`${x.label} ${x.note||''}`.trim());
  return{overall,label:{pass:'Meets spec',review:'Needs review',fail:'Out of spec'}[overall],metrics:m,reasons:reasons.length?reasons:['All measured parameters within spec.']};
}
const VC={pass:'v-pass',review:'v-review',fail:'v-fail',await:'v-await'};
function chip(o){const v=verdict(o);return `<span class="chip ${VC[v.overall]}">${esc(v.label)}</span>`;}
function apprCell(l){
  if(l.status==='awaiting')return `<span class="appr-pending">Awaiting CoA</span>`;
  if(l.approval==='approved'||l.approval==='rejected'){
    const who=l.approvedBy?' '+esc(l.approvedBy):'';
    const lab=l.approval==='approved'?'Approved':'Rejected';
    const cls=l.approval==='approved'?'appr-chip':'rej-chip';
    return `<span class="${cls}" data-decide="clear" data-id="${esc(l.id)}" title="${lab}${l.approvedAt?' '+esc(l.approvedAt):''}${who} — click to revert">${lab}</span>`;
  }
  return `<span class="appr-actions"><button type="button" class="appr-btn" data-decide="approved" data-id="${esc(l.id)}">Approve</button><button type="button" class="rej-btn" data-decide="rejected" data-id="${esc(l.id)}">Reject</button></span>`;
}

/* ---------- Planning · Flower Procurement Schedule ----------
   Source: SharePoint · 03. Operations / 08. Planning · "2026-06-21 - Flower Procurement Schedule SLT.xlsx".
   Monthly qty in grams; spend = qty × $/g. Hydrocarbon pricing is TBD and excluded from totals. */
const FLOWER_SCHED={
  yr:'2026', updated:'2026-06-21',
  months:['Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
  rows:[
    {n:'Pre-Roll · Indica',          t:'31%+ THC',   ppg:0.75, c:'--pre',    q:[400000,265000,280000,140000,140000,140000,140000]},
    {n:'Pre-Roll · Sativa',          t:'31%+ THC',   ppg:0.75, c:'--lav',    q:[400000,285000,320000,160000,160000,160000,160000]},
    {n:'Infused Pre-Roll · LP',      t:'26–29% THC', ppg:0.75, c:'--flower', q:[0,0,0,16000,16000,16000,16000]},
    {n:'Infused Pre-Roll · HP',      t:'26–29% THC', ppg:0.75, c:'--teal',   q:[0,0,0,7000,7000,7000,7000]},
    {n:'Extraction · GMP Distillate',t:'20% THC',    ppg:0.6,  c:'--accent', q:[0,0,0,400000,200000,200000,200000]},
    {n:'Extraction · Hydrocarbon',   t:'pricing TBD',ppg:0.18, c:'--faint', tbd:true, q:[null,null,null,null,null,null,null]},
  ]
};
function buildSchedule(){
  const S=FLOWER_SCHED, MO=S.months, P=S.rows;
  const priced=P.filter(p=>!p.tbd);
  const rowQ=p=>p.q.reduce((a,v)=>a+(v||0),0);
  const rowS=p=>rowQ(p)*p.ppg;
  const moQ=i=>priced.reduce((a,p)=>a+(p.q[i]||0),0);
  const grandQ=priced.reduce((a,p)=>a+rowQ(p),0);
  const grandS=priced.reduce((a,p)=>a+rowS(p),0);
  const blended=grandQ>0?grandS/grandQ:0;
  let pk=0; for(let i=1;i<MO.length;i++) if(moQ(i)>moQ(pk)) pk=i;
  const maxMo=Math.max(...MO.map((m,i)=>moQ(i)),1);
  const kg=g=>fmtN(g/1000);

  const stats=`<div class="stat-row">
    <div class="stat"><div class="k">Total Quantity</div><div class="v teal">${kg(grandQ)} kg</div><div class="s">≈ ${(grandQ/1e6).toFixed(2)} t · excl. Hydrocarbon</div></div>
    <div class="stat"><div class="k">Total Spend</div><div class="v" style="color:var(--accent)">${fmtMoneyK(grandS)}</div><div class="s">planned procurement</div></div>
    <div class="stat"><div class="k">Blended Cost</div><div class="v lav"><span class="cash">$${blended.toFixed(2)}/g</span></div><div class="s">≈ $${Math.round(blended*1000).toLocaleString()}/kg</div></div>
    <div class="stat"><div class="k">Product Lines</div><div class="v">${P.length}</div><div class="s">${priced.length} priced · 1 TBD</div></div>
    <div class="stat"><div class="k">Planning Horizon</div><div class="v amber">${MO[0]}–${MO[MO.length-1]}</div><div class="s">${S.yr} · ${MO.length} months</div></div>
    <div class="stat"><div class="k">Peak Month</div><div class="v">${MO[pk]}</div><div class="s">${kg(moQ(pk))} kg</div></div>
  </div>`;

  const legend=`<div class="legend">${P.map(p=>`<div class="leg"><div class="leg-sq" style="background:var(${p.c})"></div>${esc(p.n)}</div>`).join('')}</div>`;

  const chart=`<div class="sched-chart">${MO.map((m,i)=>{
    const tot=moQ(i);
    const segs=priced.map(p=>{const v=p.q[i]||0; if(!v)return''; return `<div class="sc-seg" style="height:${(v/tot*100).toFixed(2)}%;background:var(${p.c})" title="${esc(p.n)}: ${kg(v)} kg"></div>`;}).join('');
    return `<div class="sc-col"><div class="sc-tot">${tot?kg(tot):''}</div><div class="sc-bar" style="height:${(tot/maxMo*100).toFixed(2)}%">${segs}</div></div>`;
  }).join('')}</div>
  <div class="sched-xaxis">${MO.map(m=>`<div>${m}</div>`).join('')}</div>`;

  const G='minmax(0,1.7fr) .5fr repeat(7,.62fr) .82fr .9fr';
  const head=`<div class="mrow head" style="grid-template-columns:${G}"><div>Flower Type</div><div>$/g</div>${MO.map(m=>`<div>${m}</div>`).join('')}<div>Total kg</div><div>Total $</div></div>`;
  const body=P.map(p=>{
    const cells=p.q.map(v=>p.tbd?`<div class="mc-cell muted">TBD</div>`:`<div class="mc-cell">${v?kg(v):'—'}</div>`).join('');
    return `<div class="mrow" style="grid-template-columns:${G}">
      <div class="mc-month"><span class="dot" style="background:var(${p.c})"></span><span class="skf-d">${esc(p.n)}<small>${esc(p.t)}</small></span></div>
      <div class="mc-cell"><span class="cash">$${p.ppg.toFixed(2)}</span></div>
      ${cells}
      <div class="mc-cell teal">${p.tbd?'<span class="muted">TBD</span>':kg(rowQ(p))}</div>
      <div class="mc-cell" style="color:var(--accent)">${p.tbd?'<span class="muted">TBD</span>':fmtMoneyK(rowS(p))}</div>
    </div>`;
  }).join('');
  const totRow=`<div class="mrow skf-tot" style="grid-template-columns:${G}">
      <div class="mc-month">Total · ${priced.length} priced lines</div>
      <div class="mc-cell muted">—</div>
      ${MO.map((m,i)=>`<div class="mc-cell">${kg(moQ(i))}</div>`).join('')}
      <div class="mc-cell teal">${kg(grandQ)}</div>
      <div class="mc-cell" style="color:var(--accent)">${fmtMoneyK(grandS)}</div>
    </div>`;

  const card=`<div class="sched-card">
      <div class="sched-head">
        <div class="sched-name"><span class="dot" style="background:var(--accent)"></span>Monthly Quantity by Product (kg)</div>
        <div class="badges"><span class="tb tb-vol">${kg(grandQ)} kg planned</span><span class="tb">${MO[0]}–${MO[MO.length-1]} ${S.yr}</span></div>
      </div>
      ${stats}
      ${legend}
      ${chart}
      <div class="mtable">${head}${body}${totRow}</div>
    </div>`;

  const note=`<p class="sched-note">Source: SharePoint · 03. Operations / 08. Planning · “2026-06-21 - Flower Procurement Schedule SLT.xlsx”. Spend = quantity × $/g; Hydrocarbon pricing is TBD and excluded from totals.</p>`;

  return `<div class="page-head"><div><h2>Flower Procurement Schedule</h2></div><div class="sched-badge"><span class="tb">${S.yr} Plan · updated ${S.updated}</span></div></div>${card}${note}`;
}

/* ============================ pages ============================ */
function showPage(p){
  closeCoaModal();
  curPage=p; let r;
  if(p==='home')r=buildHome();
  else if(p==='library')r=buildLibrary();
  else if(p==='approved')r=buildDecision('approved');
  else if(p==='rejected')r=buildDecision('rejected');
  else if(p==='specs')r=buildSpecs();
  else if(p==='schedule')r=buildSchedule();
  else if(p.slice(0,5)==='type:'){const t=p.slice(5); if(PTYPES.indexOf(t)>=0)curSpecType=t; r=buildType();}
  else if(p==='intake'||p.slice(0,7)==='intake:'){
    if(p.slice(0,7)==='intake:'){const t=p.slice(7); if(PTYPES.indexOf(t)>=0){intakeType=t;curSpecType=t;} intakeFrom='type';}
    else intakeFrom='home';
    r=buildIntake();
  }
  else if(p.slice(0,4)==='lot:'){curLot=p.slice(4);r=buildLot(curLot);}
  else r=buildLibrary();
  $('#main').innerHTML=r;
  renderNav();
  if(p==='home')wireHome();
  if(p==='intake'||p.slice(0,7)==='intake:')wireIntake();
  if(p==='specs')wireSpecs();
  if(p.slice(0,5)==='type:')wireType();
  if(p==='library')wireLibrary();
  if(p.slice(0,4)==='lot:')wireLot();
  window.scrollTo(0,0);
}

function libBody(){
  let rows=LOTS.filter(l=>!l.approval);
  if(supFilter!=='all')rows=rows.filter(l=>l.supplier===supFilter);
  const q=listFilter.trim().toLowerCase();
  if(q)rows=rows.filter(l=>(l.id+' '+l.strain+' '+l.supplier).toLowerCase().includes(q));
  // group by supplier
  const groups={}; rows.forEach(l=>{(groups[l.supplier]=groups[l.supplier]||[]).push(l);});
  const keys=Object.keys(groups).sort();
  if(!keys.length){
    if(!LOTS.length)return `<div class="panel"><div class="empty">No samples yet — use <b>Add sample</b> on the <b>Home</b> page to log your first one.</div></div>`;
    if(!LOTS.some(l=>!l.approval))return `<div class="panel"><div class="empty">No outstanding samples — every lot has been approved or rejected.</div></div>`;
    return `<div class="panel"><div class="empty">No outstanding lots match "${esc(listFilter)}".</div></div>`;
  }
  const collapsed=new Set(load('coa.collapsedSups',[]));
  return keys.map(s=>{
    const ls=groups[s];
    const isCol=collapsed.has(s);
    return `<div class="panel${isCol?' collapsed':''}">
      <div class="panel-head" data-sup-panel="${esc(s)}"><div class="ph-t"><svg class="chevron" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg><span class="dot" style="background:var(--accent)"></span>${esc(s)}</div><div class="ph-meta">${ls.length} lot${ls.length>1?'s':''}</div></div>
      <table><thead><tr>
        <th class="l">Lot / strain</th><th class="l">Category</th><th class="l">CoA age</th><th>Total THC</th><th>CBD</th><th>Moisture</th><th>Micro</th><th class="l">Verdict</th><th class="l">Status</th>
      </tr></thead><tbody>
      ${ls.map(l=>{const f=verdict(l).metrics.reduce((a,m)=>{a[m.key]=m.s;return a;},{});

function sparkline(pts,color){
  const W=320,H=70,pad=10;
  if(!pts.length)return `<div class="spark-empty">No data yet</div>`;
  if(pts.length===1)return `<svg class="spark" viewBox="0 0 ${W} ${H}"><circle cx="${W/2}" cy="${H/2}" r="3.5" fill="${color}"/></svg><div class="spark-note">One sample — the trend fills in as more CoAs are logged.</div>`;
  const ts=pts.map(p=>p.t),vs=pts.map(p=>p.v);
  const tmin=Math.min(...ts),tmax=Math.max(...ts),vmin=Math.min(...vs),vmax=Math.max(...vs);
  const sx=t=>pad+(tmax===tmin?0.5:(t-tmin)/(tmax-tmin))*(W-2*pad);
  const sy=v=>{const r=vmax===vmin?0.5:(v-vmin)/(vmax-vmin);return H-pad-r*(H-2*pad);};
  const line=pts.map(p=>`${sx(p.t).toFixed(1)},${sy(p.v).toFixed(1)}`).join(' ');
  const area=`${pad.toFixed(1)},${(H-pad).toFixed(1)} ${line} ${(W-pad).toFixed(1)},${(H-pad).toFixed(1)}`;
  const first=pts[0],last=pts[pts.length-1];
  return `<svg class="spark" viewBox="0 0 ${W} ${H}">
    <polyline points="${area}" fill="${color}" opacity="0.10"/>
    <polyline points="${line}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${sx(first.t).toFixed(1)}" cy="${sy(first.v).toFixed(1)}" r="2.4" fill="${color}" opacity="0.45"/>
    <circle cx="${sx(last.t).toFixed(1)}" cy="${sy(last.v).toFixed(1)}" r="3.4" fill="${color}"/>
  </svg>`;
}
function libStats(){
  let rows=LOTS.filter(l=>l.status!=='awaiting');

  const q=listFilter.trim().toLowerCase();
  if(q)rows=rows.filter(l=>(l.id+' '+l.strain+' '+l.supplier).toLowerCase().includes(q));
  const groups={}; rows.forEach(l=>{(groups[l.supplier]=groups[l.supplier]||[]).push(l);});
  const keys=Object.keys(groups).sort();
  if(!keys.length){
    if(!LOTS.length)return `<div class="panel"><div class="empty">No samples yet — add a sample to start building potency &amp; moisture history.</div></div>`;
    return `<div class="panel"><div class="empty">No received samples${supFilter!=='all'?` from ${esc(supFilter)}`:''} yet — stats appear once a CoA has been parsed.</div></div>`;
  }
  const pT=d=>{const t=Date.parse(d);return isNaN(t)?null:t;};
  const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:null;
  const pct=v=>v==null?'—':v.toFixed(1)+'%';
  const rng=a=>a.length?`${Math.min(...a).toFixed(1)}–${Math.max(...a).toFixed(1)}%`:'—';
  return keys.map(s=>{

          <div class="stat-tile"><div class="st-k">Avg potency</div><div class="st-v accent">${pct(avg(thcV))}</div><div class="st-s">Total THC ${rng(thcV)}</div></div>

function patchCard(it){
  const wrap=$('#coaItems'); if(!wrap)return;
  const card=wrap.querySelector(`[data-item="${it.key}"]`);
  if(card)card.outerHTML=itemHtml(it); else wrap.insertAdjacentHTML('beforeend',itemHtml(it));
}
function syncEdits(){
  const wrap=$('#coaItems'); if(!wrap)return;
  wrap.querySelectorAll('[data-item]').forEach(card=>{
    const it=intakeItems.find(x=>x.key===card.dataset.item); if(!it)return;
    card.querySelectorAll('[data-f]').forEach(i=>{ it[i.dataset.f]=i.value.trim()||null; });
  });
